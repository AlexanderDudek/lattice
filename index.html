<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LATTICE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #010103;
      font-family: 'Courier New', monospace;
      color: #e0e0e0;
      cursor: crosshair;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    #hint {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 2px;
      color: #222;
      text-transform: uppercase;
      pointer-events: none;
      transition: opacity 2s ease;
      z-index: 10;
    }
    #audio-hint {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      color: #1a1a2a;
      pointer-events: none;
      transition: opacity 1s;
      z-index: 10;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hint"></div>
  <div id="audio-hint">click to begin</div>
  <script type="module" src="/src/universe.ts"></script>
</body>
</html>
