<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LATTICE — Mode Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #030306; font-family: 'Courier New', monospace; color: #e0e0e0; }
    #grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: 1fr 1fr;
      width: 100vw;
      height: 100vh;
      gap: 1px;
      background: #111;
      transition: gap 0.4s ease;
    }
    /* Last row: 3 items centered — the 5th/6th/7th cells span the bottom row */
    .quadrant:nth-child(5) { grid-column: 1 / 2; }
    .quadrant:nth-child(6) { grid-column: 2 / 3; }
    .quadrant:nth-child(7) { grid-column: 3 / 4; }
    #grid.fullscreen {
      gap: 0;
    }
    .quadrant {
      position: relative;
      overflow: hidden;
      background: #050508;
    }
    #grid.fullscreen .quadrant {
      display: none;
    }
    #grid.fullscreen .quadrant.expanded {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 50;
    }
    .quadrant canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .quad-label {
      position: absolute;
      top: 8px;
      left: 10px;
      font-size: 9px;
      color: #444;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 10;
      line-height: 1.6;
    }
    .quad-label .mode-name {
      font-size: 13px;
      font-weight: bold;
      display: block;
      margin-bottom: 2px;
      letter-spacing: 3px;
      cursor: pointer;
      pointer-events: auto;
      transition: text-shadow 0.3s;
    }
    .quad-label .mode-name:hover {
      text-shadow: 0 0 8px currentColor;
    }
    .quad-counter {
      position: absolute;
      top: 8px;
      right: 10px;
      font-size: 11px;
      color: #555;
      text-align: right;
      pointer-events: none;
      z-index: 10;
      line-height: 1.8;
    }
    .quad-hint {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: #333;
      pointer-events: none;
      z-index: 10;
      white-space: nowrap;
      transition: color 0.5s;
    }
    #audio-hint {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      color: #333;
      padding: 4px 14px;
      background: rgba(5,5,8,0.8);
      border-top: 1px solid #1a1a2a;
      border-radius: 4px 4px 0 0;
      z-index: 100;
      transition: opacity 1s;
    }
    #control-panel {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 1px;
      z-index: 300;
      background: rgba(20,20,30,0.6);
      border: 1px solid #222;
      border-radius: 4px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      overflow: hidden;
      opacity: 1;
      transition: opacity 0.6s ease;
    }
    #control-panel.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #control-panel button {
      background: transparent;
      border: none;
      color: #555;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 6px 14px;
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
      white-space: nowrap;
    }
    #control-panel button:hover {
      color: #ccc;
      background: rgba(255,255,255,0.05);
    }
    #control-panel button:active {
      color: #fff;
    }
    #control-panel .sep {
      width: 1px;
      background: #222;
      align-self: stretch;
    }
  </style>
</head>
<body>
  <canvas id="merged-canvas" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:40;"></canvas>
  <div id="audio-hint">click anywhere to enable audio</div>
  <div id="control-panel">
    <button id="btn-view">grid</button>
    <div class="sep"></div>
    <button id="btn-fs">fullscreen</button>
  </div>
  <div id="grid">
    <!-- Slots generated by JS from morphology registry -->
  </div>
  <script type="module" src="/src/test-modes.ts"></script>
</body>
</html>
